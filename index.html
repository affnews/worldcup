<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 USA</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;

  background:
  linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.75)),
  url("https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=2000&q=80")
  center/cover no-repeat;
}

.container{
  max-width:650px;
  padding:30px;
}

.badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  font-size:13px;
  letter-spacing:1px;
  margin-bottom:20px;
}

h1{
  font-size:clamp(44px,8vw,86px);
  font-weight:900;
  text-transform:uppercase;
  line-height:0.95;
  margin-bottom:18px;
}

.sub{
  font-size:20px;
  line-height:1.4;
  margin-bottom:30px;
  opacity:.95;
}

.cta{
  display:inline-block;
  background:#ffcc00;
  color:#111;
  text-decoration:none;
  padding:20px 46px;
  border-radius:10px;
  font-size:22px;
  font-weight:900;
  text-transform:uppercase;
  box-shadow:0 10px 30px rgba(255,204,0,.35);
  transition:.2s ease;
}

.cta:hover{
  transform:translateY(-2px);
}

.small{
  margin-top:16px;
  font-size:13px;
  opacity:.75;
}
</style>
</head>

<body>

<div class="container">

  <div class="badge">⚽ WORLD CUP 2026 • USA</div>

  <h1>
    USA IS READY
  </h1>

  <div class="sub">
    The biggest soccer tournament on earth is here.<br>
    A limited-time bonus is now available for fans.
  </div>

  <a class="cta" href="YOUR_MYBOOKIE_LINK">
    CLAIM BONUS
  </a>

</div>

</body>
</html>
